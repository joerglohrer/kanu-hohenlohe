gauges:
  doerzbach: "00061"
  # TODO: No HVZ gauge named "Unterregenbach" exists in Baden-Württemberg.
  # The closest gauges on the Jagst are:
  #   - Dörzbach (00061) upstream
  #   - Elpershofen (00063) downstream
  # 00069 = Untermünstertal/Neumagen (Freiburg area) — WRONG gauge; kept as
  # placeholder so the orchestrator does not crash. Replace with 00063
  # (Elpershofen) if a second Jagst reading is desired.
  unterregenbach: "00063"   # Elpershofen/Jagst — nearest downstream substitute
thresholds:
  min_cm: 40
  komfort_cm: 60
  hochwasser_cm: 225        # HW-Stufe 1 from HVZ Stammdaten (Dörzbach/Jagst)
  max_regen_24h_mm: 5.0
  max_anstieg_cm_per_h: 3.0
catchment_geojson: "config/catchment.geojson"
cron:
  timezone: "Europe/Berlin"
