name: Update Ampel

on:
  schedule:
    # 05,08,11,14,17,20 local (Europe/Berlin). Cron is in UTC.
    # Two crons cover DST (winter UTC = local-1, summer UTC = local-2).
    # Extra runs dedupe naturally via status.prev logic.
    - cron: "0 3,6,9,12,15,18 * * *"
    - cron: "0 4,7,10,13,16,19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -e ".[dev]"

      - run: pytest -x

      - run: python -m src.main --config config/config.yaml --data data --catchment config/catchment.geojson

      - name: Commit data updates
        run: |
          git config user.name "kanu-hohenlohe-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data/
          git diff --cached --quiet || git commit -m "data: update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
