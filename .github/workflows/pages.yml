name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/status.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r web/* _site/
          if [ -d data ]; then
            mkdir -p _site/data
            cp -r data/* _site/data/ 2>/dev/null || true
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
